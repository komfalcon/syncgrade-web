name: cgpa_app
description: Offline academic CGPA platform with deterministic engine calculations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  intl: ^0.19.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  file_picker: ^6.1.1
  csv: ^6.0.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
